name: TPS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules

  validate-json:
    - name: Validate JSON Schema
  run: |
    if compgen -G "schemas/*.json" > /dev/null 2>&1; then
      echo "Found JSON schema files, validating..."
      npx ajv-cli@4 validate -s schemas/*.json || true
    else
      echo "No JSON schema files found, skipping validation."
    fi

  check-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress '**/*.md'
